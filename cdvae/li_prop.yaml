root_path: ${oc.env:PROJECT_ROOT}/data/li_prop
prop: 
  - formation_energy_per_atom 
  - band_gap # 双属性预测
num_targets: 2 # multi-target property prediction, set to 1 for single-target property prediction
# prop: scaled_lattice
# num_targets: 6
niggli: true
primitive: true
graph_method: crystalnn
lattice_scale_method: scale_length
preprocess_workers: 4 # number of CPU workers for data preprocessing
readout: mean
max_atoms: 80
max_atomic_num: 100
otf_graph: false
eval_model_name: mp20

train_max_epochs: 4000
early_stopping_patience: 100000
teacher_forcing_max_epoch: 1000


datamodule:
  _target_: cdvae.pl_data.datamodule.CrystDataModule

  datasets:
    train:
      _target_: cdvae.pl_data.dataset.CrystDataset
      name: Formation energy train
      path: ${data.root_path}/train.csv
      prop: ${data.prop}
      niggli: ${data.niggli}
      primitive: ${data.primitive}
      graph_method: ${data.graph_method}
      lattice_scale_method: ${data.lattice_scale_method}
      preprocess_workers: ${data.preprocess_workers}

    val:
      - _target_: cdvae.pl_data.dataset.CrystDataset
        name: Formation energy val
        path: ${data.root_path}/val.csv
        prop: ${data.prop}
        niggli: ${data.niggli}
        primitive: ${data.primitive}
        graph_method: ${data.graph_method}
        lattice_scale_method: ${data.lattice_scale_method}
        preprocess_workers: ${data.preprocess_workers}

    test:
      - _target_: cdvae.pl_data.dataset.CrystDataset
        name: Formation energy test
        path: ${data.root_path}/test.csv
        prop: ${data.prop}
        niggli: ${data.niggli}
        primitive: ${data.primitive}
        graph_method: ${data.graph_method}
        lattice_scale_method: ${data.lattice_scale_method}
        preprocess_workers: ${data.preprocess_workers}

  num_workers:
    train: 0
    val: 0
    test: 0

  batch_size:
    train: 16
    val: 16
    test: 16
